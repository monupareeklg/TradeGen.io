<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Tutorials and guides on building trading UIs, WebSocket market data, order books and candlestick charts with Node.js." />
  <meta name="keywords" content="trading UI tutorial, nodejs websocket, market data, binance websocket, order book, candlestick chart" />
  <meta property="og:title" content="Blog — TradeSim" />
  <meta property="og:description" content="Tutorials and guides on building trading UIs with Node.js." />
  <meta property="og:url" content="https://tradesim.dev/blog/" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="canonical" href="https://tradesim.dev/blog/" />
  <title>Blog — TradeSim</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Blog",
    "name": "TradeSim Blog",
    "description": "Tutorials and guides on building trading UIs with Node.js",
    "url": "https://tradesim.dev/blog/",
    "publisher": {
      "@type": "Person",
      "name": "Love Pareek",
      "url": "https://github.com/monupareeklg"
    }
  }
  </script>

  <style>
    :root {
      --bg:      #040608;
      --surface: #0c0f14;
      --border:  #1a1f2a;
      --text:    #e8edf5;
      --muted:   #5a6478;
      --accent:  #00d4aa;
      --mono:    'DM Mono', monospace;
      --sans:    'DM Sans', sans-serif;
      --display: 'Syne', sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Grid overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,170,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,170,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Nav ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(4,6,8,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: var(--display);
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--text);
    }

    .nav-logo span { color: var(--accent); }

    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--text); }

    .nav-links a.active { color: var(--accent); }

    .nav-npm {
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.4rem 1rem;
      border: 1px solid var(--accent);
      border-radius: 4px;
      color: var(--accent) !important;
      transition: background 0.2s !important;
      font-family: var(--mono);
    }

    .nav-npm:hover { background: rgba(0,212,170,0.1) !important; }

    /* ── Hero ── */
    .hero {
      position: relative;
      z-index: 1;
      padding: 5rem 2rem 3rem;
      max-width: 800px;
      margin: 0 auto;
    }

    .hero-label {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .hero h1 {
      font-family: var(--display);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    .hero p {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 500px;
    }

    /* ── Main content ── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 800px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }

    /* ── Tags filter ── */
    .tags-bar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .tag-btn {
      font-family: var(--mono);
      font-size: 0.72rem;
      padding: 0.3rem 0.75rem;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .tag-btn:hover { border-color: var(--muted); color: var(--text); }
    .tag-btn.active {
      background: rgba(0,212,170,0.1);
      border-color: rgba(0,212,170,0.3);
      color: var(--accent);
    }

    /* ── Post list ── */
    .posts-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .post-card {
      display: block;
      padding: 2rem 0;
      border-bottom: 1px solid var(--border);
      transition: all 0.2s;
    }

    .post-card:first-child { padding-top: 0; }
    .post-card:last-child  { border-bottom: none; }

    .post-card:hover .post-title { color: var(--accent); }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .post-date {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
    }

    .post-read-time {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
    }

    .post-tags {
      display: flex;
      gap: 0.4rem;
      margin-left: auto;
    }

    .post-tag {
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      background: rgba(0,212,170,0.08);
      border: 1px solid rgba(0,212,170,0.15);
      color: var(--accent);
    }

    .post-title {
      font-family: var(--display);
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 0.5rem;
      color: var(--text);
      transition: color 0.2s;
      line-height: 1.3;
    }

    .post-excerpt {
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.6;
      max-width: 600px;
    }

    .post-arrow {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.75rem;
      font-size: 0.82rem;
      color: var(--accent);
      font-family: var(--mono);
      opacity: 0;
      transform: translateX(-4px);
      transition: all 0.2s;
    }

    .post-card:hover .post-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 4rem 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 4rem 0;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.82rem;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    footer p {
      font-size: 0.8rem;
      color: var(--muted);
    }

    footer a { color: var(--accent); }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav>
    <a href="/" class="nav-logo">Trade<span>Sim</span></a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/demo">Demo</a></li>
      <li><a href="/blog/" class="active">Blog</a></li>
      <li><a href="https://github.com/monupareeklg/trade-data-generator" target="_blank">GitHub</a></li>
      <li><a href="https://www.npmjs.com/package/trade-data-generator" target="_blank" class="nav-npm">npm</a></li>
    </ul>
  </nav>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-label">Blog</div>
    <h1>Tutorials & guides</h1>
    <p>Deep dives into building trading UIs, real-time WebSocket data, order books and candlestick charts with Node.js.</p>
  </div>

  <!-- Content -->
  <div class="container">

    <!-- Tags filter -->
    <div class="tags-bar" id="tags-bar">
      <button class="tag-btn active" onclick="filterTag('all')">All</button>
    </div>

    <!-- Posts -->
    <div class="posts-list" id="posts-list">
      <div class="loading">Loading posts...</div>
    </div>

  </div>

  <!-- Footer -->
  <footer>
    <p>© 2026 TradeSim by <a href="https://github.com/monupareeklg" target="_blank">Love Pareek</a> · MIT License</p>
  </footer>

<script>
  let allPosts   = []
  let activeTag  = 'all'

  // ── Load posts from JSON ────────────── //
  async function loadPosts() {
    try {
      const res   = await fetch('/blog/data/posts.json')
      const posts = await res.json()
      allPosts    = posts
      buildTagsBar(posts)
      renderPosts(posts)
    } catch (err) {
      document.getElementById('posts-list').innerHTML =
        '<div class="empty">No posts yet — check back soon.</div>'
    }
  }

  // ── Build tags bar ──────────────────── //
  function buildTagsBar(posts) {
    const tags    = new Set()
    posts.forEach(p => p.tags?.forEach(t => tags.add(t)))

    const bar     = document.getElementById('tags-bar')
    bar.innerHTML = '<button class="tag-btn active" onclick="filterTag(\'all\')">All</button>'

    tags.forEach(tag => {
      const btn = document.createElement('button')
      btn.className   = 'tag-btn'
      btn.textContent = tag
      btn.onclick     = () => filterTag(tag)
      bar.appendChild(btn)
    })
  }

  // ── Filter by tag ───────────────────── //
  function filterTag(tag) {
    activeTag = tag

    document.querySelectorAll('.tag-btn').forEach(b => {
      b.classList.toggle('active', b.textContent === tag || (tag === 'all' && b.textContent === 'All'))
    })

    const filtered = tag === 'all'
      ? allPosts
      : allPosts.filter(p => p.tags?.includes(tag))

    renderPosts(filtered)
  }

  // ── Render posts ────────────────────── //
  function renderPosts(posts) {
    const list = document.getElementById('posts-list')

    if (!posts.length) {
      list.innerHTML = '<div class="empty">No posts found.</div>'
      return
    }

    list.innerHTML = posts.map(post => `
      <a class="post-card" href="/blog/${post.slug}/">
        <div class="post-meta">
          <span class="post-date">${formatDate(post.date)}</span>
          <span class="post-read-time">${post.readTime}</span>
          <div class="post-tags">
            ${(post.tags ?? []).slice(0, 3).map(t => `<span class="post-tag">${t}</span>`).join('')}
          </div>
        </div>
        <div class="post-title">${post.title}</div>
        <div class="post-excerpt">${post.excerpt}</div>
        <div class="post-arrow">Read more →</div>
      </a>
    `).join('')
  }

  // ── Format date ─────────────────────── //
  function formatDate(dateStr) {
    return new Date(dateStr).toLocaleDateString('en-US', {
      month: 'long', day: 'numeric', year: 'numeric'
    })
  }

  loadPosts()
</script>
</body>
</html>
